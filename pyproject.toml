[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mograder"
version = "0.1.0"
description = "Semi-automated grading for Marimo notebooks"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "marimo>=0.19",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-playwright",
    "ruff",
]
grader = [
    "seaborn",
    "matplotlib",
]

[project.scripts]
mograder = "mograder.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/mograder"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.ruff]
src = ["src"]
