name: Deploy WASM Dashboard

on:
  push:
    branches: [main]
    paths:
      - src/mograder/student_wasm_app.py
      - .github/workflows/pages.yml
      - demo/course/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Export WASM app
        run: uv run marimo export html-wasm src/mograder/student_wasm_app.py -o dist/index.html --mode run

      - name: Export demo-assignment notebook
        run: uv run marimo export html-wasm demo/course/demo-assignment/files/demo-assignment.py -o dist/notebooks/demo-assignment.html --mode edit

      - name: Export demo-holistic notebook
        run: uv run marimo export html-wasm demo/course/demo-holistic/files/demo-holistic.py -o dist/notebooks/demo-holistic.html --mode edit

      - name: Generate workshop notebook
        run: uv run mograder workshop encrypt demo/course/demo-workshop/files/demo-workshop.py -o demo/course/demo-workshop/files/

      - name: Export demo-workshop notebook
        run: uv run marimo export html-wasm demo/course/demo-workshop/files/demo-workshop.py -o dist/notebooks/demo-workshop.html --mode edit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
