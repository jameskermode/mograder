name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install bubblewrap (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ restricts unprivileged user namespaces via AppArmor.
          # Relax this for CI so bwrap integration tests can run.
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: uv run ruff check src/

      - name: Test
        run: uv run pytest --cov=mograder --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

      - name: Check generated examples are fresh
        run: |
          uv run mograder generate examples/source/demo-assignment/demo-assignment.py examples/source/demo-holistic/demo-holistic.py -o examples/release
          git diff --exit-code examples/release/

  pyodide-compat:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Pyodide
        run: npm install pyodide

      - name: Check runtime API matches PyPI
        run: node tests/test_pyodide_compat.js

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Remove 404 page (contains absolute nav links that only resolve when deployed)
        run: rm -f site/404.html

      - name: Check links in built site and README
        uses: lycheeverse/lychee-action@v2
        with:
          args: "'site/**/*.html' README.md --config .lychee.toml --root-dir site --no-progress"
          fail: true

  deploy-demo:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, lint]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-demo
      cancel-in-progress: false
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEMO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEMO_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ubuntu@mograder-demo.jrkermode.uk bash -s << 'SCRIPT'
            set -e
            cd /home/ubuntu/mograder
            git fetch origin
            git reset --hard origin/main
            $HOME/.local/bin/uv sync --extra hub
            PYTHON=.venv/bin/python MOGRADER=.venv/bin/mograder bash demo/setup_formgrader_demo.sh
            # Export workshop
            .venv/bin/mograder workshop export demo/course/demo-workshop/files/demo-workshop.py -o demo/workshop-export --salt mograder
            # Ensure workshop env vars in systemd service
            sudo sed -i '/MOGRADER_WORKSHOP/d' /etc/systemd/system/mograder-demo.service
            sudo sed -i '/ExecStart/i Environment=MOGRADER_WORKSHOP_DIR=/home/ubuntu/mograder/demo/workshop-export' /etc/systemd/system/mograder-demo.service
            sudo sed -i '/ExecStart/i Environment=MOGRADER_WORKSHOP_SECRET=mograder-demo-secret' /etc/systemd/system/mograder-demo.service
            sudo systemctl daemon-reload
            sudo systemctl restart mograder-demo
          SCRIPT

      - name: Verify
        run: |
          sleep 8
          ROOT=$(curl -s -o /dev/null -w "%{http_code}" https://mograder-demo.jrkermode.uk/)
          API=$(curl -s -o /dev/null -w "%{http_code}" https://mograder-demo.jrkermode.uk/assignments)
          KEYS=$(curl -s -o /dev/null -w "%{http_code}" https://mograder-demo.jrkermode.uk/keys.json)
          DASH=$(curl -s -o /dev/null -w "%{http_code}" https://mograder-demo.jrkermode.uk/dashboard.html)
          TOML=$(curl -s -o /dev/null -w "%{http_code}" https://mograder-demo.jrkermode.uk/mograder.toml)
          echo "Root: $ROOT, Assignments: $API, Keys: $KEYS, Dashboard: $DASH, TOML: $TOML"
          [ "$ROOT" = "200" ] && [ "$API" = "200" ] && [ "$KEYS" = "200" ] && [ "$DASH" = "200" ] && [ "$TOML" = "200" ] || { echo "::error::Health check failed"; exit 1; }

  demo-student-test:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [deploy-demo]
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Fetch and validate demo config
        run: |
          curl -f https://mograder-demo.jrkermode.uk/mograder.toml -o /tmp/mograder.toml
          cat /tmp/mograder.toml
          python -c "
          import tomllib
          with open('/tmp/mograder.toml', 'rb') as f:
              d = tomllib.load(f)
          assert d['transport'] == 'https', f'expected https, got {d[\"transport\"]}'
          assert d['https']['url'] == 'https://mograder-demo.jrkermode.uk', f'wrong url: {d[\"https\"][\"url\"]}'
          assert 'config_url' in d, 'missing config_url'
          print('Config validation passed')
          "

      - name: Test mograder student bootstrap
        run: |
          timeout 30 uvx mograder student https://mograder-demo.jrkermode.uk/mograder.toml --headless --no-token || true
          test -f mograder/mograder.toml
          echo "Bootstrap created mograder/mograder.toml successfully"
          cat mograder/mograder.toml
